<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Charge Calculator</title>

<style>
body{
font-family:Arial;
padding:20px;
background:#f2f2f2;
}

input,button{
width:100%;
padding:8px;
margin-top:5px;
margin-bottom:10px;
}

.output{
background:white;
padding:15px;
border-radius:6px;
margin-top:20px;
}
</style>
</head>

<body>

<h2>Charge Calculator</h2>

<label>Charge duration (hh:mm)</label>
<input id="chargeDuration" placeholder="1:50">

<label>Empty duration (hh:mm)</label>
<input id="emptyDuration" placeholder="2:30">

<label>Last charge time today (hh:mm)</label>
<input id="lastTime" placeholder="07:50">

<label>Last charge number</label>
<input id="lastNumber" type="number" placeholder="28">

<label>Target empty date & time</label>
<input id="targetDateTime" type="datetime-local">

<button onclick="calculate()">Calculate</button>

<div class="output" id="output"></div>

<script>

function parseHM(text){
let p=text.split(":");
return parseInt(p[0])*60+parseInt(p[1]);
}

function addMinutes(date,min){
return new Date(date.getTime()+min*60000);
}

function format(date){
return date.toLocaleDateString()+" "+date.toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"});
}

function calculate(){

let chargeDur=parseHM(document.getElementById("chargeDuration").value);
let emptyDur=parseHM(document.getElementById("emptyDuration").value);
let lastTime=document.getElementById("lastTime").value;
let lastNum=parseInt(document.getElementById("lastNumber").value);
let targetStr=document.getElementById("targetDateTime").value;

if(!targetStr){
document.getElementById("output").innerHTML="Please choose a target date.";
return;
}

let target=new Date(targetStr);

let lastChargeStart=new Date(target.getTime()-(chargeDur+emptyDur)*60000);

let now=new Date();
let hm=lastTime.split(":");

let lastChargeDate=new Date();
lastChargeDate.setHours(parseInt(hm[0]),parseInt(hm[1]),0,0);

if(lastChargeDate>now){
lastChargeDate.setDate(lastChargeDate.getDate()-1);
}

let diff=(lastChargeStart-lastChargeDate)/60000;
if(diff<0) diff=0;

let fullCharges=Math.floor(diff/chargeDur);

let schedule=[];

for(let i=1;i<=fullCharges;i++){
let t=addMinutes(lastChargeDate,i*chargeDur);
schedule.push("Charge "+(lastNum+i)+": "+format(t)+" — 500 kg");
}

let remaining=diff-fullCharges*chargeDur;
let lastKg=500;

if(remaining>0){
lastKg=Math.round((remaining/chargeDur)*500);
if(lastKg<200) lastKg=200;
if(lastKg>500) lastKg=500;
}

let leerMelder=addMinutes(lastChargeStart,chargeDur);

schedule.push(
"Last Charge "+(lastNum+fullCharges+1)+
": "+format(lastChargeStart)+
" — "+lastKg+" kg"+
"<br>Leer Melder: "+format(leerMelder)
);

document.getElementById("output").innerHTML=

"Total new charges: <b>"+(fullCharges+1)+"</b><br><br>"+

schedule.join("<br>")+"<br><br>"+

"Line completely empty: <b>"+format(target)+"</b>";

}

</script>

</body>
</html>
